<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeaveSync — Dashboard</title>
  <meta name="description" content="LeaveSync Dashboard — manage leave requests, balances and team schedules." />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<div id="app">

  <!-- ===================== SIDEBAR ===================== -->
  <aside id="sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">🗓️</div>
      <div class="logo-text">
        <strong>LeaveSync</strong>
        <span>Management System</span>
      </div>
    </div>

    <!-- User Info -->
    <div class="sidebar-user">
      <div class="sb-avatar" id="sb-avatar">??</div>
      <div class="sb-info">
        <strong id="sb-name">Loading…</strong>
        <span id="sb-role">—</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>

      <div class="nav-item active" data-view="dashboard">
        <span class="nav-icon">🏠</span>
        Dashboard
      </div>

      <!-- Employee Only -->
      <div class="nav-item nav-employee" data-view="apply">
        <span class="nav-icon">➕</span>
        Apply for Leave
      </div>

      <div class="nav-item" data-view="requests">
        <span class="nav-icon">📋</span>
        <span class="nav-employee" style="display:contents">My Requests</span>
        <span class="nav-manager" style="display:contents">Team Requests</span>
      </div>

      <div class="nav-item" data-view="calendar">
        <span class="nav-icon">📅</span>
        Leave Calendar
      </div>

      <!-- Manager Only -->
      <div class="nav-section-label nav-manager">Team</div>
      <div class="nav-item nav-manager" data-view="team">
        <span class="nav-icon">👥</span>
        Team Overview
      </div>

      <div class="nav-section-label">Account</div>
      <div class="nav-item" data-view="profile">
        <span class="nav-icon">👤</span>
        My Profile
      </div>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <button id="btn-logout">🚪 Sign Out</button>
    </div>
  </aside>

  <!-- ===================== MAIN WRAPPER ===================== -->
  <div id="main-wrapper">

    <!-- Header -->
    <header id="header">
      <button id="btn-menu">☰</button>
      <h1 id="page-title">Dashboard</h1>

      <div class="header-right">
        <!-- Notification Bell -->
        <div class="notif-wrap">
          <button id="btn-notif" title="Notifications">🔔</button>
          <span id="notif-badge" style="display:none;">0</span>
          <!-- Notification Panel -->
          <div id="notif-panel" class="hidden"></div>
        </div>

        <!-- User -->
        <div class="hdr-user">
          <div class="hdr-avatar" id="hdr-avatar">??</div>
          <span class="hdr-name" id="hdr-name">…</span>
          <button id="hdr-logout" title="Sign Out">↩ Logout</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Views are rendered here by app.js -->
      <div class="empty-state" style="padding-top:80px;">
        <div style="font-size:3rem">⏳</div>
        <p style="margin-top:12px;font-size:1rem;">Loading dashboard…</p>
      </div>
    </main>

  </div><!-- /main-wrapper -->

</div><!-- /app -->

<!-- ===================== ACTION MODAL ===================== -->
<div id="action-modal" class="hidden">
  <div class="modal-box">
    <h2 id="modal-title" class="modal-title">Action</h2>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="App.closeModal()">Cancel</button>
      <button id="modal-confirm" class="btn btn-success">Confirm</button>
    </div>
  </div>
</div>

<!-- ===================== TOAST CONTAINER ===================== -->
<div id="toast-container"></div>

<!-- ===================== SCRIPTS ===================== -->
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/calendar.js"></script>
<script src="js/app.js"></script>

</body>
</html>
